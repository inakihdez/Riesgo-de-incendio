name: Actualizar buscador riesgo incendio

on:
  schedule:
    # 09:00 UTC = 11:00 hora de Madrid en verano (CEST = UTC+2)
    # En invierno (CET = UTC+1) serían las 10:00h — ajustar a "0 10 * * *" en octubre
    - cron: "0 9 * * *"
  workflow_dispatch:   # permite lanzarlo manualmente desde GitHub

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: pip install requests rasterio geopandas scipy numpy

      - name: Ejecutar script
        env:
          DW_API_KEY: ${{ secrets.DW_API_KEY }}
        run: python procesar_incendio.py

      - name: Commit y push del CSV y GeoJSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/riesgo_incendio_municipios.csv municipios.geojson
          git diff --cached --quiet || git commit -m "Datos actualizados $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
